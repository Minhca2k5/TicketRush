server:
  port: 8081

spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:postgresql://localhost:5432/ticketrush
    username: minh
    password: minh123
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

jwt:
  secret: ticketrushJwtSecretKeyMustBeAtLeastThirtyTwoBytesLong2026
  expiration: 86400000  # 24 hours

app:
  seed:
    admin:
      username: admin
      password: admin123
      email: admin@ticketrush.local
