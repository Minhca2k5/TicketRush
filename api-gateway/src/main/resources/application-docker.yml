server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
      routes:
        - id: auth-service
          uri: http://auth-service:8081
          predicates:
            - Path=/auth/**
        - id: event-service
          uri: http://event-service:8082
          predicates:
            - Path=/api/events/**
        - id: booking-service
          uri: http://booking-service:8083
          predicates:
            - Path=/api/booking/**
        - id: queue-service
          uri: http://queue-service:8084
          predicates:
            - Path=/api/queue/**

jwt:
  secret: ticketrushJwtSecretKeyMustBeAtLeastThirtyTwoBytesLong2026
