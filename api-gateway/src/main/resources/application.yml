server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOriginPatterns:
              - "http://localhost:*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/auth/**
        - id: event-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/events/**
        - id: booking-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/booking/**
        - id: queue-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/queue/**

jwt:
  secret: ticketrushJwtSecretKeyMustBeAtLeastThirtyTwoBytesLong2026
