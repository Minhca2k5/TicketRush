server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/auth/**
          filters:
            - StripPrefix=1
        - id: event-service
          uri: http://localhost:8082
          predicates:
            - Path=/events/**
          filters:
            - StripPrefix=1
        - id: booking-service
          uri: http://localhost:8083
          predicates:
            - Path=/booking/**
          filters:
            - StripPrefix=1
        - id: queue-service
          uri: http://localhost:8084
          predicates:
            - Path=/queue/**
          filters:
            - StripPrefix=1